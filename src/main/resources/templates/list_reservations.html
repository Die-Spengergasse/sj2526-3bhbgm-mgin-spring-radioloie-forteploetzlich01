        <tbody>
        <tr th:each="r : ${reservations}">
            <td th:text="${r.device.id}"></td>
            <td th:text="${r.patient.firstName + ' ' + r.patient.lastName}"></td>
            <td th:text="${#dates.format(r.startTime, 'dd.MM.yyyy HH:mm')}"></td>
            <td th:text="${#dates.format(r.endTime, 'dd.MM.yyyy HH:mm')}"></td>
            <td th:text="${r.bodyRegion}"></td>
            <td th:text="${r.comment}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
