<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>add new patient</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <a href="/" class="btn btn-default">← Zurück zur Startseite</a>
        <form th:action="@{/patient/add}" th:object="${patient}" method="post">
            <div class="form-group">
                <label>Sozialversicherungsnummer</label>
                <input type="text" th:field="*{ssn}" class="form-control" placeholder="SSN">
            </div>
            <div class="form-group">
                <label>Vorname</label>
                <input type="text" th:field="*{firstName}" class="form-control" placeholder="Vorname">
            </div>
            <div class="form-group">
                <label>Nachname</label>
                <input type="text" th:field="*{lastName}" class="form-control" placeholder="Nachname">
            </div>
            <div class="form-group">
                <label>Geschlecht</label>
                <select th:field="*{gender}" class="form-control">
                    <option value="MALE">Männlich</option>
                    <option value="FEMALE">Weiblich</option>
                    <option value="DIVERSE">Divers</option>
                </select>
            </div>
            <div class="form-group">
                <label>Geburtsdatum</label>
                <input type="date" th:field="*{birth}" class="form-control">
            </div>
            <input type="submit" class="form-control btn btn-primary" value="Save">
        </form>
    </div>
</body>
</html>
